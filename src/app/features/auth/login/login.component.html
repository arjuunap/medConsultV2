<div class="auth-page-container">
  <div class="auth-card">
    <!-- Brand Mark Top of Card -->
    <a class="auth-brand" routerLink="/">
      <div class="brand-logo-icon">🩺</div>
      <h1 class="brand-name">MedConsult <span>V2</span></h1>
    </a>

    <!-- Header Text -->
    <div class="auth-header text-center">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Please enter your credentials to access your account</p>
    </div>

    <!-- Error Alert Message -->
    <div *ngIf="errorMessage" class="auth-alert-danger">
      <span class="alert-icon">⚠️</span>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <!-- Email Field -->
      <div class="form-group mb-4">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control" 
          [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          placeholder="name@example.com"
        >
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error-text">
          Please enter a valid email address.
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group mb-4">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control" 
          [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          placeholder="••••••••"
        >
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-text">
          Password must be at least 6 characters.
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary w-100 py-3 mb-3 btn-auth">
        Sign In
      </button>

      <!-- Divider -->
      <div class="auth-divider mb-3">
        <span>or</span>
      </div>

      <!-- Google Button -->
      <button type="button" class="btn btn-outline w-100 py-3 mb-4 btn-google d-flex align-center justify-center gap-2" (click)="loginWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.87-4.53-5.84-4.53z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        <span>Continue with Google</span>
      </button>

      <!-- Footer Link to Register -->
      <div class="auth-footer">
        <span>Don't have an account?</span> 
        <a routerLink="/register" class="auth-link">Create an account</a>
      </div>
    </form>
  </div>
</div>
