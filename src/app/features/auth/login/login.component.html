<div class="auth-page-container">
  <div class="auth-card">
    <!-- Brand Mark Top of Card -->
    <a class="auth-brand" routerLink="/">
      <div class="brand-logo-icon">🩺</div>
      <h1 class="brand-name">MedConsult <span>V2</span></h1>
    </a>

    <!-- Header Text -->
    <div class="auth-header text-center">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Please enter your credentials to access your account</p>
    </div>

    <!-- Error Alert Message -->
    <div *ngIf="errorMessage" class="auth-alert-danger">
      <span class="alert-icon">⚠️</span>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <!-- Email Field -->
      <div class="form-group mb-4">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control" 
          [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          placeholder="name@example.com"
        >
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error-text">
          Please enter a valid email address.
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group mb-4">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control" 
          [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          placeholder="••••••••"
        >
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-text">
          Password must be at least 6 characters.
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary w-100 py-3 mb-4 btn-auth">
        Sign In
      </button>

      <!-- Footer Link to Register -->
      <div class="auth-footer">
        <span>Don't have an account?</span> 
        <a routerLink="/register" class="auth-link">Create an account</a>
      </div>
    </form>
  </div>
</div>
