<div class="layout-container" [class.sidebar-mobile-open]="isSidebarOpen()">
  <!-- Backdrop for Mobile/Tablet Sidebar Drawer -->
  <div class="sidebar-backdrop" (click)="closeSidebar()" *ngIf="isSidebarOpen()"></div>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="brand-section cursor-pointer" routerLink="/">
      <h1 class="brand-title">
        <span class="brand-logo-dot"></span>
        MedConsult V2
      </h1>
      <button class="mobile-close-btn" (click)="closeSidebar()" aria-label="Close menu">&times;</button>
    </div>

    <nav class="menu-section">
      <a 
        *ngFor="let item of menuItems()" 
        [routerLink]="item.route" 
        routerLinkActive="active" 
        class="menu-item"
      >
        <span class="menu-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>

      <!-- Quick Public Portal Link -->
      <a routerLink="/" class="menu-item portal-link">
        <span class="menu-icon">🌐</span>
        <span>Public Portal Home</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn btn-outline w-100 logout-btn" (click)="handleLogout()">
        🚪 Logout
      </button>
    </div>
  </aside>

  <!-- Main View Area -->
  <div class="main-area">
    <!-- Top Header Bar -->
    <header class="header">
      <div class="d-flex align-center gap-3">
        <!-- Mobile Toggle Button -->
        <button class="hamburger-btn" (click)="toggleSidebar()" aria-label="Toggle navigation menu">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="page-title m-0">
          Dashboard
        </div>
        <a routerLink="/" class="btn btn-sm btn-outline-primary py-1 px-3 fs-xs rounded-pill portal-pill-btn">
          🌐 View Public Portal
        </a>
      </div>

      <div class="user-profile" *ngIf="authService.currentUser() as user">
        <div class="user-avatar">
          <img *ngIf="user.avatarUrl" [src]="user.avatarUrl | apiUrl" alt="Avatar" (error)="user.avatarUrl = ''">
          <span *ngIf="!user.avatarUrl">{{ userInitials() }}</span>
        </div>
        <div class="user-details">
          <span class="user-name">{{ user.fullName }}</span>
          <span class="user-role-badge">{{ user.role.replace('_', ' ') }}</span>
        </div>
        <button class="btn btn-sm text-danger border-0 bg-transparent ms-2 cursor-pointer logout-icon-btn" (click)="handleLogout()" title="Logout">
          🚪
        </button>
      </div>
    </header>

    <!-- Nested Content Area -->
    <main class="content-viewport">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
