<div class="custom-select-container" 
     [class.size-sm]="size === 'sm'" 
     [class.size-lg]="size === 'lg'" 
     [class.is-open]="isOpen" 
     [class.is-disabled]="disabled"
     [ngClass]="customClass">

  <!-- Main Trigger Control -->
  <button type="button" 
          class="select-trigger" 
          (click)="toggleOpen()" 
          [disabled]="disabled"
          [attr.aria-expanded]="isOpen">
    
    <div class="trigger-content">
      <span *ngIf="icon || getOptionIcon(selectedOption)" class="trigger-icon">
        {{ getOptionIcon(selectedOption) || icon }}
      </span>
      <span class="trigger-text" [class.is-placeholder]="!selectedOption && (selectedValue === null || selectedValue === undefined || selectedValue === '')">
        {{ displayLabel }}
      </span>
    </div>

    <svg class="chevron-icon" [class.rotate]="isOpen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="m6 9 6 6 6-6"/>
    </svg>
  </button>

  <!-- Animated Floating Popover Panel -->
  <div class="select-dropdown-menu" *ngIf="isOpen">
    
    <!-- Optional Quick Search Bar -->
    <div class="search-container" *ngIf="searchable" (click)="$event.stopPropagation()">
      <span class="search-icon">🔍</span>
      <input type="text" 
             class="search-input" 
             [(ngModel)]="searchQuery" 
             placeholder="Search options..." 
             (click)="$event.stopPropagation()">
    </div>

    <!-- Options List Container -->
    <ul class="options-list">
      <li *ngFor="let option of filteredOptions" 
          class="option-item" 
          [class.selected]="isSelected(option)"
          (click)="selectOption(option, $event)">
        
        <span *ngIf="getOptionIcon(option)" class="option-icon">{{ getOptionIcon(option) }}</span>
        
        <div class="option-text-group">
          <span class="option-label">{{ getOptionLabel(option) }}</span>
          <span *ngIf="option.sublabel" class="option-sublabel">{{ option.sublabel }}</span>
        </div>

        <span class="check-badge" *ngIf="isSelected(option)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </span>
      </li>

      <li class="no-options-item" *ngIf="filteredOptions.length === 0">
        No matching options
      </li>
    </ul>
  </div>

</div>
